name: Telegram Parser

on:
  schedule:
    # Запуск каждые 5 минут для поддержания работы
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Ручной запуск

jobs:
  run-parser:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install telethon
    
    - name: Run parser
      env:
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        SOURCE_CHANNELS: ${{ secrets.SOURCE_CHANNELS }}
        ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        python bot.py &
        sleep 280
    
    - name: Commit and push changes
      run: |
        git config --global user.name 'GitHub Bot'
        git config --global user.email 'bot@github.com'
        git add targets.json bot.log last_message_state.json || true
        git commit -m "Auto-update targets from channels" || echo "No changes"
        git push || echo "No push needed"
